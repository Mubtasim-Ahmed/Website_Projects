<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="spidey.jpg">
    <link rel="stylesheet" href="spidey_style.css" />
    <title>Spidey Clock</title>
</head>

<body background="Back.jpg" onload="showTime()">
    <div class="clock-container">
        <div class="clock" >
            <img src="spidey.jpg">
            <div style="--clr: #e31436c2; --h:55px; --w:5px; --h1:110px;" id="hour" class="hand"><i></i></div>
            <div style="--clr: #4eaee1d5; --h:78px; --w:4px; --h1:150px;" id="min" class="hand"><i></i></div>
            <div style="--clr: #f3f3f3c4; --h:85px; --w:2px; --h1:160px;" id="sec" class="hand"><i></i></div>

            <span style="--i: 1;"><b>1</b></span>
            <span style="--i: 2;"><b>2</b></span>
            <span style="--i: 3;"><b>3</b></span>
            <span style="--i: 4;"><b>4</b></span>
            <span style="--i: 5;"><b>5</b></span>
            <span style="--i: 6;"><b>6</b></span>
            <span style="--i: 7;"><b>7</b></span>
            <span style="--i: 8;"><b>8</b></span>
            <span style="--i: 9;"><b>9</b></span>
            <span style="--i: 10;"><b>10</b></span>
            <span style="--i: 11;"><b>11</b></span>
            <span style="--i: 12;"><b>12</b></span>
        </div>
        <div>
            <div class="hero" id="clock"></div>
        </div>
    </div>
<br>
    
    <script src="script.js"></script>
</body>

</html>
